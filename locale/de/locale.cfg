[map-gen-preset-description]
pyblock-recommended=Dies sind die empfohlenen Einstellungen für PyBlock. Ressourcen, Bäume, Felsen, Klippen und der größte Teil des Landes sind deaktiviert.\nWenn Sie mit mehr Land spielen möchten, erhöhen Sie die Inselgröße oder wechseln Sie zur normalen Geländegenerierung.
pyblock-classic=Dies ist das klassische PyBlock. Ressourcen, Bäume, Felsen, Klippen und der größte Teil des Landes sind deaktiviert. Sie beginnen auf einem einzigen Feld einer Mülldeponie und müssen die Welt nach und nach aufbauen.\nWenn Sie mit mehr Land spielen möchten, wechseln Sie zu „PyBlock-Empfohlen“.
pyblock-archipeligo=Dies ist eine Variante von Pyblock, bei der kleine Inseln generiert werden, die gelegentlich nützliche Ressourcen enthalten, aber der Großteil Ihrer Produktion stammt aus normalen PyBlock-Methoden.
default=[color=red]Diese Voreinstellung wird für PyBlock nicht empfohlen. Verwenden Sie stattdessen [/color]PyBlock-Empfohlen[color=red] aus dem Dropdown-Menü oben.[/color]

[messages]
pyblock-warning-no-preset=Es sieht so aus, als würden Sie keine „PyBlock”-Voreinstellung für die Kartenerstellung verwenden. PyBlock wurde entwickelt und ausbalanciert, um keine Ressourcen abzubauen, ist aber dennoch auf einer normalen Karte spielbar.\nWenn Sie beim Spielen von PyBlock dennoch einige Ressourcen abbauen möchten, sehen Sie sich die Voreinstellung „PyBlock Archipeligo” an.
pyblock-intro=Sie sind auf einem Planeten abgestürzt, der fast vollständig von Wasser bedeckt ist. Notnotmelon hat es mit der nuklearen Artillerie etwas übertrieben...\nAlles ist verloren, aber Sie sind jetzt hier. Vielleicht sind Sie dem Untergang geweiht... oder vielleicht gibt es hier genug, um sich durchzuschlagen.